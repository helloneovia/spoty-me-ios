workflows:
  ios-workflow:
    name: SPOTY ME iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: App Manager

    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: me.spoty.app

    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd src
          pod install

      - name: Update build number
        script: |
          cd src
          BUILD_NUMBER=${CM_BUILD_NUMBER}
          echo "Setting iOS build number to $BUILD_NUMBER"
          perl -i -pe "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" "SPOTY ME.xcodeproj/project.pbxproj"

      - name: Set up code signing
        script: |
          cd src
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          cd src
          xcode-project build-ipa \
            --workspace "SPOTY ME.xcworkspace" \
            --scheme "SPOTY ME"

    artifacts:
      - src/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - src/build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
