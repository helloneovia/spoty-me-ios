workflows:
  ios-workflow:
    name: SPOTY ME iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd src
          pod install

      - name: Build iOS app
        script: |
          cd src
          xcodebuild build \
            -workspace "SPOTY ME.xcworkspace" \
            -scheme "SPOTY ME" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - src/build/ios/**/*.ipa
      - src/build/ios/**/*.app
      - src/build/ios/**/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
